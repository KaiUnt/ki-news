# HTTP – nur für Certbot-Challenge und Redirect
server {
    listen 80;
    server_name news.kais.world;

    # Let's Encrypt ACME Challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Alles andere → HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS – Produktions-Config
server {
    listen 443 ssl;
    server_name news.kais.world;

    ssl_certificate     /etc/letsencrypt/live/news.kais.world/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/news.kais.world/privkey.pem;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Security Headers
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;

    # Proxy zur FastAPI-App
    location / {
        proxy_pass         http://app:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # Statische Dateien direkt über Nginx (optional, schneller)
    location /static/ {
        proxy_pass http://app:8000/static/;
    }
}
