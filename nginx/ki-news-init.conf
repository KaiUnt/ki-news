# Nginx-Config für die initiale Zertifikat-Ausstellung (nur HTTP).
# Wird nur während des ersten Setups verwendet.
# Danach: nginx/ki-news.conf (mit SSL) wird aktiv.

server {
    listen 80;
    server_name news.kais.world;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 200 'OK – Certbot-Setup läuft';
        add_header Content-Type text/plain;
    }
}
