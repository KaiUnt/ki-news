<div class="bg-white border border-slate-200 rounded-xl p-5 shadow-sm hover:shadow-md transition-shadow">
  <div class="flex items-start justify-between gap-3 mb-3">
    <div class="flex-1">
      {% if item.rank %}
      <span class="text-xs font-bold text-indigo-500 mr-2">#{{ item.rank }}</span>
      {% endif %}
      <span class="font-semibold text-slate-900">{{ item.title }}</span>
    </div>
  </div>

  {% if item.summary %}
  <p class="text-sm text-slate-600 leading-relaxed mb-3">{{ item.summary }}</p>
  {% endif %}

  {% if item.importance %}
  <div class="bg-amber-50 border border-amber-100 rounded-lg p-3 mb-3 text-sm text-amber-800">
    <span class="font-semibold">Einschätzung: </span>{{ item.importance }}
  </div>
  {% endif %}

  {% if item.source_url %}
  <a href="{{ item.source_url }}" target="_blank" rel="noopener"
    class="text-xs text-indigo-500 hover:underline inline-flex items-center gap-1">
    🔗 Zum Originalartikel
  </a>
  {% endif %}
</div>
