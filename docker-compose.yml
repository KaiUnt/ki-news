services:

  app:
    build: ./ai-briefing-app
    container_name: ki-news-app
    env_file: ./ai-briefing-app/.env
    restart: unless-stopped
    expose:
      - "8000"
    networks:
      - ki-news-net

  nginx:
    image: nginx:1.27-alpine
    container_name: ki-news-nginx
    volumes:
      - ./nginx/ki-news.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot-www:/var/www/certbot:ro
      - certbot-certs:/etc/letsencrypt:ro
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - app
    restart: unless-stopped
    networks:
      - ki-news-net

  certbot:
    image: certbot/certbot
    container_name: ki-news-certbot
    volumes:
      - certbot-www:/var/www/certbot
      - certbot-certs:/etc/letsencrypt
    # Automatische Renewal alle 12h
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew --quiet; sleep 12h & wait $${!}; done;'"

volumes:
  certbot-www:
  certbot-certs:

networks:
  ki-news-net:
